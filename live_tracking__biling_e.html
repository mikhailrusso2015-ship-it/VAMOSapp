<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Live Ride Tracking - Premium Neumorphic</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Vibrant Orange
                        "space-blue": "#0a1128", // Deep Space Blue
                        "deep-blue": "#001f54", // Mid-Deep Blue
                        "cerulean": "#034078",
                        "soft-blue": "#1282a2",
                        "background-light": "#f0f4f8",
                        "background-dark": "#0a1128",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                    boxShadow: {
                        'neu-light': '8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff',
                        'neu-dark': '6px 6px 12px #050814, -4px -4px 12px #0f1a3c',
                        'neu-orange': '4px 4px 8px #c44b10, -2px -2px 8px #ff6b16',
                        'neu-inset': 'inset 2px 2px 5px #babecc, inset -5px -5px 10px #ffffff',
                    }
                },
            },
        }
    </script>
<style>
        .neu-flat {
            background: #f0f4f8;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #ffffff;
        }
        .dark .neu-flat {
            background: #0a1128;
            box-shadow: 6px 6px 12px #050814, -4px -4px 12px #0f1a3c;
        }
        .neu-pressed {
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
        }
        .dark .neu-pressed {
            box-shadow: inset 4px 4px 8px #050814, inset -4px -4px 8px #0f1a3c;
        }
        .map-gradient {
            background: linear-gradient(180deg, rgba(10,17,40,0.4) 0%, rgba(10,17,40,0) 20%, rgba(10,17,40,0) 80%, rgba(10,17,40,0.6) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between p-4 z-20">
<button class="w-10 h-10 flex items-center justify-center rounded-xl neu-flat dark:neu-flat text-cerulean dark:text-soft-blue">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-sm font-semibold uppercase tracking-widest text-cerulean dark:text-soft-blue">En ruta / En Route</h1>
<div class="flex items-center gap-1 mt-1">
<span class="size-2 rounded-full bg-primary animate-pulse"></span>
<p class="text-[10px] font-bold text-slate-500 dark:text-slate-400">LIVE TRACKING</p>
</div>
</div>
<div class="flex items-center rounded-xl neu-flat dark:neu-flat p-1">
<button class="px-3 py-1 text-xs font-bold rounded-lg bg-cerulean text-white">ES</button>
<button class="px-3 py-1 text-xs font-bold rounded-lg text-slate-500 dark:text-slate-400">EN</button>
</div>
</header>
<!-- Main Map View Container -->
<main class="relative flex-1 overflow-hidden mt-2 mb-4 mx-4 rounded-3xl neu-flat dark:neu-flat border-4 border-white/50 dark:border-slate-800/50">
<!-- Mock Map Background -->
<div class="absolute inset-0 bg-slate-200 dark:bg-slate-900 overflow-hidden">
<div class="absolute inset-0 opacity-40 dark:opacity-20" data-alt="Detailed city street map with navigation route" data-location="Mexico City" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA_CZOJqK4E_r0sbCBGKo_JMOlm4fGvw4FnzP5J1ia7hunwg5Ou6EqcJ0XM71XSt9runZxeysKAEU04kxvgIT26qNXXmb7fWE-WaG021YaEnYtIvGxG1z7KP8U7fawiPurSc1a3JdvDoG0diT-91xXZV4IS3loIgkOO1ul9nZFfRlhCub6zLy3vhG63o6orWjxMOBXmShuKJkadwO7QoxpQ6WzleHgaYbNliCeKKR5bo8MfiEkzyxCqcCWruJ4FylmKprLMSxPjExU"); background-size: cover;'>
</div>
<div class="absolute inset-0 map-gradient"></div>
<!-- Route UI Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full pointer-events-none">
<!-- Vehicle Marker -->
<div class="absolute top-[40%] left-[30%] -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="absolute -inset-4 bg-primary/20 rounded-full animate-ping"></div>
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white shadow-lg border-2 border-white">
<span class="material-symbols-outlined">directions_car</span>
</div>
</div>
</div>
<!-- Destination Marker -->
<div class="absolute top-[60%] left-[70%] -translate-x-1/2 -translate-y-1/2 text-cerulean dark:text-soft-blue">
<span class="material-symbols-outlined text-4xl">location_on</span>
</div>
</div>
</div>
<!-- Floating Controls on Map -->
<div class="absolute right-4 top-4 flex flex-col gap-3">
<button class="size-10 rounded-xl neu-flat dark:neu-flat flex items-center justify-center text-cerulean dark:text-soft-blue">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-10 rounded-xl neu-flat dark:neu-flat flex items-center justify-center text-cerulean dark:text-soft-blue">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="size-10 rounded-xl neu-flat dark:neu-flat flex items-center justify-center text-primary">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</main>
<!-- Driver Info Floating Neumorphic Card -->
<section class="px-4 pb-4">
<div class="neu-flat dark:neu-flat rounded-[2rem] p-6 flex flex-col gap-6 relative">
<!-- ETA and Trip Status -->
<div class="flex justify-between items-start">
<div>
<p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Estimated Arrival</p>
<h2 class="text-3xl font-bold text-cerulean dark:text-soft-blue">8 <span class="text-lg">mins</span></h2>
</div>
<div class="text-right">
<p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Distance</p>
<p class="text-lg font-bold text-slate-700 dark:text-slate-200">2.4 km</p>
</div>
</div>
<!-- Driver Detail -->
<div class="flex items-center gap-4 p-4 rounded-2xl neu-pressed dark:neu-pressed">
<div class="size-16 rounded-full border-4 border-white dark:border-slate-800 shadow-lg overflow-hidden shrink-0">
<img alt="Driver Portrait" class="w-full h-full object-cover" data-alt="Professional driver smiling portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmwk5FzMzuhBhT_hx_4rw2S9ycQ3RqaWCceQ4YjlsLCBwjJSPxqqBURjsPus09XkgMSDrlwuE2rR91SIxl_PBXMsX1so_XqL_MrfiLs-ZHXdjzdNeG-ixo1pgfcgMt5xO5ZbrF4oAEBZoCwswArWWIwb0kjs-DlzQF6lRdHJlKO4lD1RXhMRsFYtERtj00T10S1TwEMaeABdSCxw0hCUIJ-pN38jMDnyVXK3Our7gzS5UuYfDP-bm7LxGVMmWlgnEJbkbG5nBYzyA"/>
</div>
<div class="flex-1">
<div class="flex items-center gap-2">
<h3 class="font-bold text-lg">Alejandro</h3>
<div class="flex items-center gap-0.5 px-1.5 py-0.5 rounded-lg bg-primary/10 text-primary text-[10px] font-bold">
<span class="material-symbols-outlined text-[12px] fill-1">star</span>
                            4.9
                        </div>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400">Tesla Model 3 • <span class="font-mono font-bold text-cerulean dark:text-soft-blue">ABC-123</span></p>
</div>
<button class="size-12 rounded-full neu-flat dark:neu-flat flex items-center justify-center text-primary">
<span class="material-symbols-outlined">chat</span>
</button>
</div>
<!-- Action Buttons Grid -->
<div class="grid grid-cols-3 gap-4">
<button class="flex flex-col items-center gap-2 py-3 rounded-2xl neu-flat dark:neu-flat group active:neu-pressed">
<span class="material-symbols-outlined text-cerulean dark:text-soft-blue">phone</span>
<span class="text-[10px] font-bold uppercase text-slate-500">Call</span>
</button>
<button class="flex flex-col items-center gap-2 py-3 rounded-2xl neu-flat dark:neu-flat active:neu-pressed">
<span class="material-symbols-outlined text-cerulean dark:text-soft-blue">share</span>
<span class="text-[10px] font-bold uppercase text-slate-500">Share</span>
</button>
<button class="flex flex-col items-center gap-2 py-3 rounded-2xl bg-primary shadow-neu-orange text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined fill-1">warning</span>
<span class="text-[10px] font-bold uppercase">SOS</span>
</button>
</div>
</div>
</section>
<!-- Bottom Navigation -->
<nav class="mt-auto bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-cerulean dark:text-soft-blue" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">explore</span>
<span class="text-[10px] font-bold uppercase">Activity</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="text-[10px] font-bold uppercase">Wallet</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</a>
</nav>
</body></html>
