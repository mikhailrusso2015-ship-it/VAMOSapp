<script>
function selectDate(btn) {
  document.querySelectorAll('.date-tile').forEach(b => {
    b.classList.remove('bg-primary', 'text-white', 'font-bold', 'shadow-lg', 'shadow-primary/20');
    b.classList.add('hover:bg-slate-800');
  });
  btn.classList.add('bg-primary', 'text-white', 'font-bold', 'shadow-lg', 'shadow-primary/20');
  btn.classList.remove('hover:bg-slate-800');
}

function toggleAMPM(type) {
  const am = document.getElementById('ampm-am');
  const pm = document.getElementById('ampm-pm');
  if (type === 'AM') {
    am.classList.add('bg-primary', 'text-white');
    am.classList.remove('bg-background-dark', 'text-slate-400');
    pm.classList.add('bg-background-dark', 'text-slate-400');
    pm.classList.remove('bg-primary', 'text-white');
  } else {
    pm.classList.add('bg-primary', 'text-white');
    pm.classList.remove('bg-background-dark', 'text-slate-400');
    am.classList.add('bg-background-dark', 'text-slate-400');
    am.classList.remove('bg-primary', 'text-white');
  }
}
</script>

<!-- Schedule Form Interactivity -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  let selectedDate = new Date();
  const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
  
  function renderCalendar() {
    const today = new Date();
    const monthDisplay = document.querySelector('.font-bold');
    if(monthDisplay && monthDisplay.textContent.includes('20')) {
      monthDisplay.textContent = monthNames[today.getMonth()] + ' ' + today.getFullYear();
    }
    
    document.querySelectorAll('.grid.grid-cols-7 button').forEach(function(btn) {
      const day = btn.textContent.trim();
      if(day && !isNaN(day) && parseInt(day) >= 1 && parseInt(day) <= 31) {
        btn.style.cursor = 'pointer';
        btn.onclick = function() {
          document.querySelectorAll('.grid.grid-cols-7 button').forEach(function(b) {
            b.classList.remove('bg-primary', 'text-white', 'shadow-lg');
          });
          btn.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
          selectedDate.setDate(parseInt(day));
          localStorage.setItem('vamos_ride_date', selectedDate.toISOString());
        };
      }
    });
  }
  
  let isPM = false;
  document.querySelectorAll('.flex.flex-col.gap-2 button').forEach(function(btn) {
    btn.style.cursor = 'pointer';
    btn.onclick = function() {
      isPM = !isPM;
      document.querySelectorAll('.flex.flex-col.gap-2 button').forEach(function(b) {
        b.classList.remove('bg-primary', 'text-white');
        b.classList.add('bg-background-dark', 'text-slate-400');
      });
      btn.classList.remove('bg-background-dark', 'text-slate-400');
      btn.classList.add('bg-primary', 'text-white');
      localStorage.setItem('vamos_ride_time', isPM ? 'PM' : 'AM');
    };
  });
  
  renderCalendar();
});
</script>

      var wrap = img.parentElement;
      if(wrap){ wrap.style.cursor='pointer'; wrap.onclick=function(e){e.stopPropagation();go('profile');}; }
    });

    // ─── 5. Bottom navigation by icon ─────────────────────────
    var navMap = {
      'home':'home','explore':'home','inicio':'home',
      'search':'dashboard','buscar':'dashboard','near_me':'dashboard',
      'directions_car':'history','route':'history','viajes':'history',
      'payments':'wallet','billetera':'wallet','account_balance_wallet':'wallet',
      'person':'profile','perfil':'profile','account_circle':'profile',
      'notifications':'notifications',
      'chat':'chat','message':'chat','forum':'chat',
      'settings':'profile','tune':'profile',
      'add_circle':'create_route','add':'create_route',
    };
    document.querySelectorAll('nav a, nav button, [class*="bottom"] a').forEach(function(el){
      var ico = el.querySelector('[class*="material"]');
      var txt = (el.textContent||'').trim().toLowerCase().replace(/\s+/g,' ');
      var icon = ico ? ico.textContent.trim() : '';
      var key = navMap[icon] || navMap[txt];
      if(!key){
        // fuzzy match on label text
        if(/inicio|home/.test(txt)) key='home';
        else if(/buscar|search/.test(txt)) key='dashboard';
        else if(/viajes|rides|trips/.test(txt)) key='history';
        else if(/billetera|wallet/.test(txt)) key='wallet';
        else if(/perfil|profile/.test(txt)) key='profile';
        else if(/notif/.test(txt)) key='notifications';
        else if(/mensajes|chat/.test(txt)) key='chat';
        else if(/configur|settings/.test(txt)) key='profile';
        else if(/crear|create|add/.test(txt)) key='create_route';
        else if(/explorar|explore/.test(txt)) key='home';
        else if(/historial|history/.test(txt)) key='history';
      }
      if(key){
        el.setAttribute('href','javascript:void(0)');
        el.style.cursor='pointer';
        (function(k){ el.onclick=function(e){e.preventDefault();e.stopPropagation();go(k);}; })(key);
      }
    });

    // ─── 6. Per-page specific button rules ─────────────────────
    var rules = [[".neumorphic-button-primary", "create_pricing"]];
    rules.forEach(function(r){
      try {
        document.querySelectorAll(r[0]).forEach(function(el){
          if(r[1]===null) return; // input fields etc., skip

      [/^(verificar|verify|completar kyc)$/i, 'kyc'],

      [/^(cerrar sesi[oó]n|log out|logout)$/i, 'login'],
      [/^(editar perfil|edit profile)$/i, 'profile'],
      [/^(alerta sos|send sos|enviar sos)$/i, 'sos'],
      [/^(compartir ubicaci[oó]n|share location)$/i, 'sos'],
      [/^(compartir|share)$/i, 'refer'],
      [/^(copiar c[oó]digo|copy code)$/i, 'refer'],
      [/^(referir un amigo|refer a friend|invitar amigos|invite friends)$/i, 'refer'],
      [/^(mensajes|chat)$/i, 'chat'],

      [/^(preguntas frecuentes|faq)$/i, 'faq'],
      [/^(contactar soporte|contact support)$/i, 'chat'],

    document.querySelectorAll('button, a').forEach(function(el){
