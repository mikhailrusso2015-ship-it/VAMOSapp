<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VAMOS – Alerta SOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#F59A2F","space-blue":"#040521"},fontFamily:{display:["Public Sans"]}}}}</script>
<style>
  body{font-family:'Public Sans',sans-serif;background:#040521;min-height:100dvh;}
  .nm-flat{background:#040521;box-shadow:6px 6px 14px #020211,-6px -6px 14px #060831;}
  .sos-pulse{animation:sosPulse 1.2s ease-in-out infinite;}
  @keyframes sosPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.7),0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 24px rgba(239,68,68,0),0 0 0 48px rgba(239,68,68,0);}}
  .ring-animate{animation:ringPulse 2s linear infinite;}
  @keyframes ringPulse{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.6);opacity:0;}}
  .contact-card{transition:all .2s;}
  .contact-card:active{transform:scale(.97);}
</style>
</head>
<body class="flex flex-col text-white" style="min-height:100dvh">

<!-- Header -->
<header class="flex items-center gap-3 px-4 pt-4 pb-2">
  <button onclick="back()" class="nm-flat p-2 rounded-xl">
    <span class="material-symbols-outlined text-slate-400">arrow_back</span>
  </button>
  <div>
    <h1 class="font-bold text-lg text-white">Alerta de Emergencia</h1>
    <p class="text-xs text-slate-400">Venezuela · Emergencias: 171</p>
  </div>
</header>

<!-- Countdown + SOS button -->
<div class="flex flex-col items-center justify-center pt-6 pb-4 gap-6 px-4">
  <!-- Animated rings -->
  <div class="relative flex items-center justify-center w-56 h-56">
    <div class="absolute inset-0 rounded-full bg-red-600/10 ring-animate" style="animation-delay:0s"></div>
    <div class="absolute inset-0 rounded-full bg-red-600/10 ring-animate" style="animation-delay:.6s;"></div>
    <div class="absolute inset-4 rounded-full bg-red-600/10 ring-animate" style="animation-delay:1.2s;"></div>
    
    <!-- Main SOS Button -->
    <button id="sos-main-btn" onclick="activateSOS()"
      class="w-40 h-40 rounded-full bg-red-600 sos-pulse flex flex-col items-center justify-center text-white border-4 border-red-400/40 relative z-10">
      <span class="material-symbols-outlined text-5xl font-bold mb-1">sos</span>
      <span class="text-sm font-bold uppercase tracking-widest">Presiona</span>
    </button>
  </div>

  <!-- Auto-call countdown -->
  <div id="countdown-section" class="hidden text-center">
    <p class="text-red-400 font-bold text-lg animate-pulse">Llamando al 171 en...</p>
    <p id="countdown-num" class="text-6xl font-black text-red-500">5</p>
    <button onclick="cancelSOS()" class="mt-2 px-6 py-2 rounded-xl border border-slate-600 text-slate-400 text-sm font-bold">
      Cancelar
    </button>
  </div>

  <!-- Active SOS banner -->
  <div id="active-sos" class="hidden w-full bg-red-600/20 border border-red-600/40 rounded-2xl p-4 text-center">
    <p class="text-red-400 font-bold">🚨 SOS Activado</p>
    <p class="text-xs text-slate-400 mt-1">Contactos notificados por WhatsApp</p>
  </div>
</div>

<!-- Quick Actions -->
<div class="px-4 grid grid-cols-2 gap-3 mb-4">
  <button onclick="callEmergency()" class="nm-flat rounded-2xl p-4 flex flex-col items-center gap-2 border border-red-600/30 active:scale-95 transition-transform">
    <div class="w-12 h-12 rounded-xl bg-red-600/20 flex items-center justify-center">
      <span class="material-symbols-outlined text-red-400 text-2xl">call</span>
    </div>
    <p class="font-bold text-white text-sm">Llamar al 171</p>
    <p class="text-xs text-slate-400">Emergencias Venezuela</p>
  </button>

  <button onclick="shareLocation()" class="nm-flat rounded-2xl p-4 flex flex-col items-center gap-2 border border-primary/30 active:scale-95 transition-transform">
    <div class="w-12 h-12 rounded-xl bg-primary/20 flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-2xl">share_location</span>
    </div>
    <p class="font-bold text-white text-sm">Compartir Ubicación</p>
    <p class="text-xs text-slate-400">A tus contactos</p>
  </button>
</div>

<!-- Emergency Contacts -->
<div class="px-4 flex-1">
  <div class="flex items-center justify-between mb-3">
    <h2 class="font-bold text-white">Contactos de Emergencia</h2>
    <button onclick="showAddContact()" class="text-xs text-primary font-bold flex items-center gap-1">
      <span class="material-symbols-outlined text-sm">add</span> Agregar
    </button>
  </div>

  <div id="contacts-list" class="space-y-2">
    <!-- Contacts loaded from localStorage -->
  </div>

  <!-- Add contact form (hidden by default) -->
  <div id="add-contact-form" class="hidden nm-flat rounded-2xl p-4 mt-3 border border-primary/20">
    <h3 class="font-bold text-sm mb-3 text-primary">Nuevo Contacto de Emergencia</h3>
    <div class="space-y-3">
      <input id="contact-name" type="text" placeholder="Nombre completo"
        class="w-full h-12 px-4 rounded-xl bg-space-blue text-white border border-slate-700 focus:border-primary focus:ring-0 text-sm"/>
      <div class="flex items-center gap-2 bg-space-blue rounded-xl border border-slate-700 focus-within:border-primary overflow-hidden">
        <span class="px-3 text-sm text-primary font-bold whitespace-nowrap">🇻🇪 +58</span>
        <input id="contact-phone" type="tel" placeholder="(04xx) xxx-xx.xx"
          class="flex-1 h-12 bg-transparent text-white border-none focus:ring-0 text-sm"
          oninput="formatPhone(this)"/>
      </div>
      <select id="contact-relation" class="w-full h-12 px-4 rounded-xl bg-space-blue text-white border border-slate-700 focus:border-primary focus:ring-0 text-sm">
        <option value="">Relación...</option>
        <option>Familiar</option>
        <option>Amigo/a</option>
        <option>Pareja</option>
        <option>Colega</option>
      </select>
      <div class="flex gap-2">
        <button onclick="hideAddContact()" class="flex-1 py-2 rounded-xl border border-slate-600 text-slate-400 text-sm font-bold">Cancelar</button>
        <button onclick="saveContact()" class="flex-1 py-2 rounded-xl bg-primary text-white text-sm font-bold">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Bottom padding -->
<div class="h-6"></div>

<script>
function nav(t){if(window.parent!==window){window.parent.postMessage({nav:t},'*');}else{window.location.href=t;}}
function back(){if(window.parent!==window){window.parent.postMessage({back:true},'*');}else{window.history.back();}  }

// Load contacts from localStorage
var CONTACTS_KEY = 'vamos_sos_contacts';
function getContacts(){ return JSON.parse(localStorage.getItem(CONTACTS_KEY)||'[]'); }
function saveContacts(arr){ localStorage.setItem(CONTACTS_KEY, JSON.stringify(arr)); }

function renderContacts(){
  var contacts = getContacts();
  var list = document.getElementById('contacts-list');
  if(contacts.length === 0){
    list.innerHTML = '<div class="text-center py-6 text-slate-500"><span class="material-symbols-outlined text-3xl block mb-2 opacity-30">contacts</span><p class="text-sm">Sin contactos de emergencia</p><p class="text-xs mt-1">Toca + Agregar para configurar hasta 3 contactos</p></div>';
    return;
  }
  list.innerHTML = contacts.map(function(c,i){
    return '<div class="contact-card nm-flat rounded-xl p-3 flex items-center gap-3 border border-slate-800">'+
      '<div class="w-10 h-10 rounded-xl bg-primary/15 flex items-center justify-center text-primary font-bold text-lg">'+c.name[0]+'</div>'+
      '<div class="flex-1">'+
        '<p class="font-bold text-sm text-white">'+c.name+'</p>'+
        '<p class="text-xs text-slate-400">🇻🇪 +58 '+c.phone+' · '+c.relation+'</p>'+
      '</div>'+
      '<div class="flex gap-2">'+
        '<button onclick="deleteContact('+i+')" class="w-9 h-9 rounded-xl bg-red-600/10 border border-red-600/20 flex items-center justify-center text-red-400">'+
          '<span class="material-symbols-outlined text-base">delete</span>'+
        '</button>'+
      '</div>'+
    '</div>';
  }).join('');
  
  // Add message hint
  var hint = document.createElement('div');
  hint.className = 'mt-4 p-3 bg-primary/5 rounded-xl border border-primary/20';
  hint.innerHTML = '<p class="text-[11px] text-primary/80 leading-relaxed font-medium"><span class="material-symbols-outlined text-xs align-middle mr-1">location_on</span> Los mensajes incluirán automáticamente tu ubicación en tiempo real mediante Google Maps para que tus contactos puedan rastrearte de inmediato.</p>';
  list.appendChild(hint);
}

// Add contact
function showAddContact(){
  var contacts = getContacts();
  if(contacts.length >= 3){ alert('Máximo 3 contactos de emergencia permitidos.'); return; }
  document.getElementById('add-contact-form').classList.remove('hidden');
}
function hideAddContact(){ document.getElementById('add-contact-form').classList.add('hidden'); }
function saveContact(){
  var name = document.getElementById('contact-name').value.trim();
  var phone = document.getElementById('contact-phone').value.trim();
  var relation = document.getElementById('contact-relation').value;
  if(!name || !phone){ alert('Nombre y teléfono son requeridos.'); return; }
  var contacts = getContacts();
  contacts.push({name:name, phone:phone, relation:relation});
  saveContacts(contacts);
  hideAddContact();
  renderContacts();
  document.getElementById('contact-name').value='';
  document.getElementById('contact-phone').value='';
}
function deleteContact(i){
  var contacts = getContacts();
  contacts.splice(i,1);
  saveContacts(contacts);
  renderContacts();
}

// WhatsApp individual
function sendWhatsApp(i){
  var contacts = getContacts();
  var c = contacts[i];
  var phone = '58' + c.phone.replace(/\D/g,'').replace(/^0/,'');
  var msg = encodeURIComponent('🚨 ALERTA SOS - VAMOS App\n\nHola '+c.name+', necesito ayuda de emergencia. Esta es mi ubicación actual:\nhttps://maps.google.com/?q=10.4806,-66.9036\nUsuario VAMOS.');
  window.open('https://api.whatsapp.com/send?phone='+phone+'&text='+msg, '_blank');
}

// Send WhatsApp to all contacts
function sendAllWhatsApp(){
  var contacts = getContacts();
  if(contacts.length === 0){ alert('No tienes contactos de emergencia configurados.\nAgrega hasta 3 contactos en esta pantalla.'); return; }
  contacts.forEach(function(c, i){
    setTimeout(function(){
      var phone = '58' + c.phone.replace(/\D/g,'').replace(/^0/,'');
      var msg = encodeURIComponent('🚨 ALERTA SOS URGENTE - VAMOS App\n\nHola '+c.name+', NECESITO AYUDA de emergencia ahora mismo.\n📍 Mi ubicación: https://maps.google.com/?q=10.4806,-66.9036\n⚠️ Enviado automáticamente desde la app VAMOS.');
      window.open('https://api.whatsapp.com/send?phone='+phone+'&text='+msg, '_blank');
    }, i * 1200);
  });
}

// Call 171
function callEmergency(){
  if(confirm('¿Confirmas llamar al 171 (Emergencias Venezuela)?')){
    window.location.href = 'tel:171';
  }
}

// Share location via maps
function shareLocation(){
  var text = encodeURIComponent('📍 Mi ubicación actual (VAMOS App):\nhttps://maps.google.com/?q=10.4806,-66.9036');
  if(navigator.share){ navigator.share({title:'Mi ubicación - VAMOS',text:text}); }
  else { window.open('https://api.whatsapp.com/send?text='+text,'_blank'); }
}

// SOS main activation
var sosActive = false;

function activateSOS(){
  if(sosActive) return;
  sosActive = true;
  
  // Visual feedback
  document.getElementById('sos-main-btn').classList.add('animate-ping');
  document.getElementById('sos-main-btn').style.background = '#991b1b'; // Darker red
  
  // Instant trigger
  triggerFullSOS();
}

function triggerFullSOS(){
  document.getElementById('active-sos').classList.remove('hidden');
  
  // 1. WhatsApp to all contacts first (to ensure they get the alert before the call occupies the line)
  sendAllWhatsApp();
  
  // 2. Small delay then trigger call 171
  setTimeout(function(){
    window.location.href = 'tel:171';
  }, 1000);
}

// Updated WhatsApp with better location info
function sendAllWhatsApp(){
  var contacts = getContacts();
  if(contacts.length === 0){ 
    alert('No tienes contactos de emergencia configurados. Abriendo configuración...'); 
    showAddContact();
    return; 
  }

  // Get real location if possible
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var lat = position.coords.latitude;
      var lng = position.coords.longitude;
      dispatchMessages(lat, lng);
    }, function() {
      // Fallback to Caracas center
      dispatchMessages(10.4806, -66.9036);
    }, {enableHighAccuracy: true, timeout: 5000});
  } else {
    dispatchMessages(10.4806, -66.9036);
  }
}

function dispatchMessages(lat, lng) {
  var contacts = getContacts();
  contacts.forEach(function(c, i){
    setTimeout(function(){
      var phone = '58' + c.phone.replace(/\D/g,'').replace(/^0/,'');
      var mapLink = 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
      var msg = encodeURIComponent('🚨 ALERTA SOS URGENTE - VAMOS App\n\nHola '+c.name+', NECESITO AYUDA ahora mismo.\n\n📍 Mi ubicación en tiempo real:\n' + mapLink + '\n\n⚠️ Enviado automáticamente. Por favor no ignores este mensaje.');
      window.open('https://wa.me/'+phone+'?text='+msg, '_blank');
    }, i * 2000); // 2s gap between windows to avoid popup blockers
  });
}

// Format phone
function formatPhone(inp){
  var v = inp.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  var f='';
  if(v.length>=4) f='(0'+v.slice(1,4)+') ';
  else if(v.length>=1) f='(0'+v.slice(1);
  if(v.length>=7) f+=v.slice(4,7)+'-';
  else if(v.length>4) f+=v.slice(4);
  if(v.length>=9) f+=v.slice(7,9)+'.'+v.slice(9);
  else if(v.length>7) f+=v.slice(7);
  inp.value=f;
}

renderContacts();
</script>
</body>
</html>
