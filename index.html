<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VAMOS – Selección de Modo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#F59A2F",
          "space-blue": "#040521",
          "deep-blue": "#081D56",
          "cerulean": "#62AAE5"
        },
        fontFamily: { display: ["Public Sans","sans-serif"] }
      }
    }
  }
</script>
<style>
  body { 
    margin: 0; padding: 0; box-sizing: border-box; 
    background: #040521; font-family: 'Public Sans', sans-serif;
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .nm-card { background:#040521; box-shadow:8px 8px 20px #020211,-8px -8px 20px #060831; }
  .nm-inset { background:#040521; box-shadow:inset 4px 4px 8px #020211,inset -4px -4px 8px #060831; }
  .nm-btn { background:#F59A2F; box-shadow:4px 4px 10px #9e631e,-2px -2px 6px #ffcc8d; }
  
  .role-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; }
  .role-card:hover { border-color: #F59A2F; transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
  .role-card:active { transform: scale(0.98); }
</style>
</head>
<body class="p-6">

<div class="w-full max-w-[420px] flex flex-col items-center gap-12">
  
  <!-- Logo Section -->
  <div class="flex flex-col items-center gap-4">
    <div class="size-32 nm-card rounded-[2.5rem] flex items-center justify-center p-3 border-2 border-white/5 animate-pulse">
      <img src="logo_vamos.png" alt="VAMOS Logo" class="w-full h-full object-contain">
    </div>
    <div class="text-center">
      <h1 class="text-5xl font-black text-white tracking-tighter">VAMOS</h1>
      <p class="text-cerulean text-[10px] font-black uppercase tracking-[0.5em] mt-1 opacity-80">Venezuela</p>
    </div>
  </div>

  <!-- Instruction -->
  <div class="text-center space-y-2">
    <h2 class="text-2xl font-black text-white tracking-tight">¿Cómo deseas usar la app?</h2>
    <p class="text-slate-500 font-medium">Selecciona tu modo de uso para comenzar</p>
  </div>

  <!-- Selection Grid -->
  <div class="grid grid-cols-2 gap-6 w-full">
    <!-- MODO PASAJERO -->
    <div onclick="selectMode('pasajero')" class="role-card nm-card rounded-[2rem] p-8 flex flex-col items-center gap-6 border border-white/5">
      <div class="size-20 nm-inset rounded-2xl flex items-center justify-center text-primary">
        <span class="material-symbols-outlined text-4xl">person</span>
      </div>
      <div class="text-center">
        <span class="block text-xl font-black text-white">Pasajero</span>
        <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">Busco viajes</span>
      </div>
    </div>

    <!-- MODO CHOFER -->
    <div onclick="selectMode('chofer')" class="role-card nm-card rounded-[2rem] p-8 flex flex-col items-center gap-6 border border-white/5">
      <div class="size-20 nm-inset rounded-2xl flex items-center justify-center text-cerulean">
        <span class="material-symbols-outlined text-4xl">airline_seat_recline_normal</span>
      </div>
      <div class="text-center">
        <span class="block text-xl font-black text-white">Chofer</span>
        <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">Ofrezco viajes</span>
      </div>
    </div>
  </div>

  <!-- Footer Info -->
  <p class="text-slate-600 text-[10px] font-black uppercase tracking-widest mt-4">
    VAMOS v2.0 • Premium Carpooling
  </p>

</div>

<script>
  function selectMode(role) {
    // Persistent Role Storage
    localStorage.setItem('vamos_role', role);
    localStorage.setItem('vamos_initialized', 'true');
    
    // Smooth Transition to Auth
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.4s ease';
    
    setTimeout(() => {
      window.location.href = 'login___sign_up.html';
    }, 400);
  }

  // Clear session on entry to index (Force fresh start as per Pilar 1)
  window.onload = () => {
    // If coming from logout, we ensure state is clean
    console.log("VAMOS Entry Facade Initialized");
  };
</script>

</body>
</html>
