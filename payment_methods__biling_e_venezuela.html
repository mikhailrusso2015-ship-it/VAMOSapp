<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vamos - Método de Pago</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#F59A2F", // Vibrant Orange
                        "deep-space": "#040521",
                        "mid-deep": "#081D56",
                        "cerulean": "#62AAE5",
                        "background-light": "#f8f6f6",
                        "background-dark": "#040521",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'neumorphic-sm': '4px 4px 8px #bebebe, -4px -4px 8px #ffffff',
                        'neumorphic-inset': 'inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff',
                        'neumorphic-dark': '6px 6px 12px #020212, -4px -4px 12px #060830',
                        'neumorphic-orange': '4px 4px 10px #d18328, -2px -2px 10px #ffb136',
                    }
                },
            },
        }
    </script>
<style>
        .neumorphic-card {
            background: #f8f6f6;
            box-shadow: 6px 6px 12px #d1d1d1, -6px -6px 12px #ffffff;
        }
        .dark .neumorphic-card {
            background: #081D56;
            box-shadow: 6px 6px 12px #030414, -2px -2px 8px #0d2b7a;
        }
        .neumorphic-button-primary {
            background: #F59A2F;
            box-shadow: 4px 4px 10px #d18328, -2px -2px 10px #ffb136;
        }
        .neumorphic-inset-box {
            box-shadow: inset 4px 4px 8px #d1d1d1, inset -4px -4px 8px #ffffff;
        }
        .dark .neumorphic-inset-box {
            box-shadow: inset 4px 4px 8px #030414, inset -2px -2px 8px #0d2b7a;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between p-4 pt-6">
<button class="w-10 h-10 flex items-center justify-center rounded-xl neumorphic-card text-mid-deep dark:text-cerulean">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-center">
<h1 class="text-sm font-bold uppercase tracking-wider text-mid-deep dark:text-cerulean">Vamos</h1>
<p class="text-xs font-medium text-slate-500 dark:text-slate-400">Payment Method / Pago</p>
</div>
<button class="px-3 py-1 text-xs font-bold rounded-full neumorphic-card border border-primary/20 text-primary">
            EN/ES
        </button>
</header>
<main class="flex-1 px-4 py-2 overflow-y-auto">
<!-- Balance/Trip Cost Section -->
<div class="neumorphic-card rounded-2xl p-6 mb-8 text-center border border-white/10">
<p class="text-xs font-semibold text-slate-500 dark:text-cerulean/70 uppercase tracking-widest mb-1">Trip Cost / Costo del Viaje</p>
<h2 class="text-4xl font-bold text-mid-deep dark:text-white mb-1">$15.40</h2>
<div class="flex items-center justify-center gap-2">
<span class="text-lg font-medium text-primary">~ 675.20 Bs</span>
<span class="text-[10px] px-2 py-0.5 rounded bg-primary/10 text-primary font-bold">REF. BCV</span>
</div>
</div>
<h3 class="text-sm font-bold text-slate-600 dark:text-slate-300 mb-4 px-1">Select Payment / Seleccione Pago</h3>
<!-- Payment Options Grid -->
<div class="grid grid-cols-1 gap-4 mb-24">
<!-- Pago Movil -->
<label class="relative cursor-pointer group">
<input checked="" class="hidden peer" name="payment" type="radio"/>
<div class="neumorphic-card peer-checked:border-2 peer-checked:border-primary rounded-2xl p-4 flex items-center justify-between transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-cerulean/10 flex items-center justify-center text-cerulean">
<span class="material-symbols-outlined text-3xl">account_balance</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Pago Móvil</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Bolívares (Bs.)</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset-box flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:group-[]:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Zelle -->
<label class="relative cursor-pointer group">
<input class="hidden peer" name="payment" type="radio"/>
<div class="neumorphic-card peer-checked:border-2 peer-checked:border-primary rounded-2xl p-4 flex items-center justify-between transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-500">
<span class="material-symbols-outlined text-3xl">bolt</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Zelle</p>
<p class="text-xs text-slate-500 dark:text-slate-400">USD Transfers</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset-box flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:group-[]:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Binance Pay -->
<label class="relative cursor-pointer group">
<input class="hidden peer" name="payment" type="radio"/>
<div class="neumorphic-card peer-checked:border-2 peer-checked:border-primary rounded-2xl p-4 flex items-center justify-between transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-yellow-500/10 flex items-center justify-center text-yellow-600">
<span class="material-symbols-outlined text-3xl">currency_bitcoin</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Binance Pay</p>
<p class="text-xs text-slate-500 dark:text-slate-400">USDT / Crypto</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset-box flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:group-[]:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
<!-- Cash -->
<label class="relative cursor-pointer group">
<input class="hidden peer" name="payment" type="radio"/>
<div class="neumorphic-card peer-checked:border-2 peer-checked:border-primary rounded-2xl p-4 flex items-center justify-between transition-all duration-200">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-green-500/10 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined text-3xl">payments</span>
</div>
<div>
<p class="font-bold text-slate-900 dark:text-white">Efectivo / Cash</p>
<p class="text-xs text-slate-500 dark:text-slate-400">USD / Bs. Person to Person</p>
</div>
</div>
<div class="w-6 h-6 rounded-full neumorphic-inset-box flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:group-[]:opacity-100 transition-opacity"></div>
</div>
</div>
</label>
</div>
</main>
<!-- Fixed Action & Footer -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<!-- Main Action Button -->
<div class="px-4 pb-6">
<button class="w-full h-14 rounded-2xl neumorphic-button-primary text-white font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span>Confirm Payment / Confirmar Pago</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Navigation Bar -->
<nav class="bg-background-light dark:bg-deep-space border-t border-slate-200 dark:border-white/5 px-6 py-3 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-semibold">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">directions_car</span>
<span class="text-[10px] font-semibold">Rides</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="absolute -top-1 -right-1 w-2 h-2 bg-primary rounded-full"></span>
</div>
<span class="text-[10px] font-bold">Wallet</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-semibold">Profile</span>
</a>
</nav>
</div>
<!-- Map Background Preview (Optional stylistic touch) -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none">
<div class="w-full h-full bg-cover bg-center" data-alt="Subtle topographic map pattern of Caracas city" data-location="Caracas" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCU18kWoEBRrSyJ5QJflPNJ2ynFXovuD4f3NgnoqJilPhbM019G-X8WK14svZw5Q4sSViTK180RXBeiYmCFC5sNCC_Pec634b6y6iQa6gmMHP0u8-oIsIZWVyKf_RYyforesHnkzMALgERG1gWgo50BMVovXkfo0XQwdJWUgwGU5mbc4KWiPMJHzZVYr1EEmXbe2aGecK5vl2Mc2IdU9TjvFzrEArlJJv40RLLrgV4-glr1-R49rEvthBYgiCi4rSQsiL1gYWtP6fY');"></div>
</div>
</body></html>
